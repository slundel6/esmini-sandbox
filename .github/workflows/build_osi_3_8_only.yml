name: Build & release OSI 3.8

on:
  push:
    tags:
      - osi-v[0-9]+.[0-9]+.[0-9]+*
  workflow_dispatch:

permissions:
  contents: write

env:
  OSI_REPOSITORY: OpenSimulationInterface/osi-cpp
  OSI_REF: 82add6cd443ea1e1dd81b3023ba756b74913c43b

jobs:
  build:
    name: ${{ matrix.os }} ${{ matrix.configuration }} ${{ matrix.linkage }}
    runs-on: ${{ matrix.os }}
    if: false
    outputs:
      osi-version: ${{ steps.versions.outputs.source-version }}
      osi-version-clean: ${{ steps.versions.outputs.source-version-clean }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        configuration: [Debug, Release]
        linkage: [static, dynamic]
        include:
          - os: ubuntu-22.04
            triplet: x64-linux
            cmake-generator: -G Ninja
            artifact-os: linux
          - os: macos-14
            triplet: universal-osx
            cmake-generator: -G Ninja
            artifact-os: macos
          - os: windows-2022
            triplet: x64-windows-static-md-v142
            cmake-generator: -G "Visual Studio 17 2022" -T v142 -A x64
            artifact-os: windows

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup_tools_shared

      - name: Checkout osi-cpp
        uses: actions/checkout@v6
        with:
          repository: ${{ env.OSI_REPOSITORY }}
          ref: ${{ env.OSI_REF }}
          path: osi-cpp
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      # "triplet" is vcpkg config that tells vcpkg three things:
      # 1. What architecture
      # 2. What OS
      # 3. How to link
      # Covers all the triplet names under "include" in the strategy step
      - name: Create overlay triplets
        shell: bash
        run: |
          FILENAME="${{ matrix.triplet }}-${{ matrix.linkage }}.cmake"
          mkdir vcpkg-triplets
          DEST="vcpkg-triplets/$FILENAME"

          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "set(VCPKG_TARGET_ARCHITECTURE arm64)" > "$DEST"
            echo "set(VCPKG_CRT_LINKAGE dynamic)" >> "$DEST"
            echo "set(VCPKG_LIBRARY_LINKAGE ${{ matrix.linkage }})" >> "$DEST"
            echo "set(VCPKG_CMAKE_SYSTEM_NAME Darwin)" >> "$DEST"
            echo "set(VCPKG_OSX_ARCHITECTURES \"arm64;x86_64\")" >> "$DEST"

          elif [ "${{ runner.os }}" = "Windows" ]; then
            echo "set(VCPKG_TARGET_ARCHITECTURE x64)" > "$DEST"
            echo "set(VCPKG_CRT_LINKAGE dynamic)" >> "$DEST"
            echo "set(VCPKG_LIBRARY_LINKAGE ${{ matrix.linkage }})" >> "$DEST"
            echo "set(VCPKG_PLATFORM_TOOLSET v142)" >> "$DEST"

            # The "Global Override" strategy: suppresses linker warnings and disables link-time code generation
            echo 'set(VCPKG_CXX_FLAGS "/nologo /GL-")' >> "$DEST"  # /nologo: suppress banner, /GL-: disable LTCG
            echo 'set(VCPKG_C_FLAGS "/nologo /GL-")' >> "$DEST"  # Same flags for C compiler

            # Explicit compiler flags for Debug and Release: optimization, debug symbols, and runtime flags
            # DEBUG:   /Od=no optimization, /MDd=dynamic MSVCRT+debug, /Z7=debug info in .obj, /Gy=function-level linking
            # RELEASE: /O2=maximize speed, /MD=dynamic MSVCRT, /DNDEBUG=disable asserts, /Gy=function-level linking, /Gw=optimize global data
            echo 'set(VCPKG_CMAKE_CONFIGURE_OPTIONS "-DCMAKE_CXX_FLAGS_DEBUG=/Od /MDd /Z7 /Gy" "-DCMAKE_CXX_FLAGS_RELEASE=/O2 /MD /DNDEBUG /Gy /Gw" "-DCMAKE_C_FLAGS_DEBUG=/Od /MDd /Z7 /Gy" "-DCMAKE_C_FLAGS_RELEASE=/O2 /MD /DNDEBUG /Gy /Gw")' >> "$DEST"

          else # Linux
            echo "set(VCPKG_TARGET_ARCHITECTURE x64)" > "$DEST"
            echo "set(VCPKG_CRT_LINKAGE dynamic)" >> "$DEST"
            echo "set(VCPKG_LIBRARY_LINKAGE ${{ matrix.linkage }})" >> "$DEST"
            echo "set(VCPKG_CMAKE_SYSTEM_NAME Linux)" >> "$DEST"
            echo "set(VCPKG_CXX_FLAGS \"-fPIC\")" >> "$DEST"
            echo "set(VCPKG_C_FLAGS \"-fPIC\")" >> "$DEST"
          fi

      # Storing some meta data about the build, last steps exports data to $GITHUB_OUTPUT which can be accessed in later action
      # Note: Using python to write to json as it is easier than doing it via bash
      - name: Derive source and vcpkg versions
        id: versions
        shell: bash
        run: |
          SOURCE_SHA=$(git -C osi-cpp rev-parse HEAD)
          # Prefer explicit tag refs, otherwise resolve a tag pointing at the checked out commit.
          if [[ "${{ env.OSI_REF }}" == v* ]]; then
            SOURCE_VERSION="${{ env.OSI_REF }}"
          else
            SOURCE_VERSION=$(git -C osi-cpp describe --tags --exact-match "$SOURCE_SHA" 2>/dev/null || true)
            if [ -z "$SOURCE_VERSION" ]; then
              SOURCE_VERSION=$(git -C osi-cpp tag --points-at "$SOURCE_SHA" | sort -V | tail -n 1)
            fi
          fi

          if [ -z "$SOURCE_VERSION" ]; then
            SOURCE_VERSION="sha-${SOURCE_SHA:0:7}"
          fi

          SOURCE_VERSION_CLEAN="${SOURCE_VERSION#v}"

          VCPKG_BASELINE=$(python3 - <<'PY'
          import json
          with open('osi-cpp/vcpkg-configuration.json', encoding='utf-8') as handle:
              print(json.load(handle)['default-registry']['baseline'])
          PY
          )

          echo "source-sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "source-version=${SOURCE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "source-version-clean=${SOURCE_VERSION_CLEAN}" >> "$GITHUB_OUTPUT"
          echo "vcpkg-baseline=${VCPKG_BASELINE}" >> "$GITHUB_OUTPUT"

      # Restore the cache if new cfg made (manually updated v1->v2 etc.) or asam-osi-utilities hash changed or vcpkg baseline changed (dependencies updated)
      # We only try to restore a cache here, not saving it (which happens later after successful build)
      - name: Restore OSI build cache
        id: cache-osi
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ github.workspace }}/build-osi
          key: osi-${{ steps.versions.outputs.source-version-clean }}-singlecfg-${{ runner.os }}-${{ matrix.triplet }}-${{ matrix.configuration }}-${{ matrix.linkage }}-${{ steps.versions.outputs.source-sha }}-${{ steps.versions.outputs.vcpkg-baseline }}

      # vcpkg talk directly to github caching servers, using github-script to fetch paths so vcpkg can upload compiled files during cache save.
      # Useful because if cache for one compiled package isn't found it will recompile only the one which isn't found but download the others
      # Note: Only runs if we didn't hit the cache
      - name: Export GitHub Actions cache environment
        if: steps.cache-osi.outputs.cache-hit != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'] || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'] || '');
            core.exportVariable('VCPKG_BINARY_SOURCES', 'clear;x-gha,readwrite');

      # This action does 3 steps:
      # 1. Bootstraps vcpkg to location and specific commit
      # Note: Only runs if we didn't hit the cache
      - name: Setup vcpkg
        if: steps.cache-osi.outputs.cache-hit != 'true'
        uses: lukka/run-vcpkg@v11 # lukka/run-vcpkg handles binary caching, env variables for cmake and error logging
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}-${{ matrix.linkage }}
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/vcpkg-triplets
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg # Create a new clean vcpkg dir inside workspace
          vcpkgGitCommitId: ${{ steps.versions.outputs.vcpkg-baseline }} # Use the vcpkg baseline saved earlier (which depends asam-osi-utils commit used)

      # We build, first setup vcpkg for suitable platform, fetch the triplets defined earlier and replace \ with / (VCPKG_TC="${VCPKG_TC//\\//}")
      # Then we do cmake, notes:
      # CMAKE_TOOLCHAIN_FILE ensures we look for libraries in vcpkg folder and NOT in system
      # VCPKG_TARGET_TRIPLET tells which OS/Architecture to use
      # Note: Only runs if we didn't hit the cache
      - name: Configure osi-cpp
        if: steps.cache-osi.outputs.cache-hit != 'true'
        shell: bash
        run: |
          SHARED_FLAG="OFF"
          if [ "${{ matrix.linkage }}" = "dynamic" ]; then
            SHARED_FLAG="ON"
          fi

          VCPKG_TC="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          VCPKG_TC="${VCPKG_TC//\\//}"
          OVERLAY_ARG="-DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/vcpkg-triplets"
          OSX_ARCH_ARGS=()
          if [ "$RUNNER_OS" = "macOS" ]; then
            OSX_ARCH_ARGS=("-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64")
          fi

          cmake \
            -S osi-cpp \
            -B build-osi \
            --preset vcpkg \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}-${{ matrix.linkage }} \
            $OVERLAY_ARG \
            "${OSX_ARCH_ARGS[@]}" \
            ${{ matrix.cmake-generator }} \
            -DBUILD_SHARED_LIBS=$SHARED_FLAG \
            -DLINK_WITH_SHARED_OSI=$SHARED_FLAG \
            -DCMAKE_BUILD_TYPE=${{ matrix.configuration }} \

      # Building into binaries stored in build-osi-deps
      - name: Build osi
        if: steps.cache-osi.outputs.cache-hit != 'true'
        shell: bash
        run: cmake --build build-osi --config ${{ matrix.configuration }}

      # Saving the cache, essentially mirrors the reestore step but saves instead
      - name: Save OSI build cache
        if: steps.cache-osi.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ github.workspace }}/build-osi
          key: osi-${{ steps.versions.outputs.source-version-clean }}-singlecfg-${{ runner.os }}-${{ matrix.triplet }}-${{ matrix.configuration }}-${{ matrix.linkage }}-${{ steps.versions.outputs.source-sha }}-${{ steps.versions.outputs.vcpkg-baseline }}

      - name: Extract Protobuf Compiler Version
        id: proto-ver
        shell: bash
        run: |
          TOOLS_DIR="build-osi/vcpkg_installed/${{ matrix.triplet }}-${{ matrix.linkage }}/tools/protobuf"

          if [ "${{ runner.os }}" = "Windows" ]; then
            PROTOC_BIN=$(ls $TOOLS_DIR/protoc*.exe | head -n 1)
          else
            PROTOC_BIN=$(ls $TOOLS_DIR/protoc* | head -n 1)
          fi

          if [ -f "$PROTOC_BIN" ]; then
            VERSION=$($PROTOC_BIN --version | awk '{print $2}')
          else
            VERSION="unknown"
          fi

          echo "protoc-version=${VERSION}" >> "$GITHUB_OUTPUT"

      # Publish summary on actions -> run
      - name: Publish job summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## OSI build

          - osi commit: ${{ steps.versions.outputs.source-sha }}
          - osi version: ${{ steps.versions.outputs.source-version }}
          - vcpkg baseline: ${{ steps.versions.outputs.vcpkg-baseline }}
          - runner: ${{ runner.os }}
          - configuration: ${{ matrix.configuration }}
          - triplet: ${{ matrix.triplet }}
          - Protoc version: ${{ steps.proto-ver.outputs.protoc-version }}
          - cache hit: ${{ steps.cache-osi.outputs.cache-hit || 'false' }}
          EOF

      # - name: Debugging with tmate
      #   if: matrix.os == 'windows-2022'
      #   uses: mxschmitt/action-tmate@v3

      - name: Prepare Artifact Paths
        shell: bash
        run: |
          VCPKG_INSTALLED_DIR="build-osi/vcpkg_installed/${{ matrix.triplet }}-${{ matrix.linkage }}"

          if [ "${{ matrix.configuration }}" = "Release" ]; then
            CONF_DIR="release"
            VCPKG_LIB_DIR="$VCPKG_INSTALLED_DIR/lib"
            VCPKG_BIN_DIR="$VCPKG_INSTALLED_DIR/bin"
          else
            CONF_DIR="debug"
            VCPKG_LIB_DIR="$VCPKG_INSTALLED_DIR/debug/lib"
            VCPKG_BIN_DIR="$VCPKG_INSTALLED_DIR/debug/bin"
          fi

          STAGING_DIR="osi-package"
          LIB_DIR_NAME="lib-dyn"
          [ "${{ matrix.linkage }}" = "static" ] && LIB_DIR_NAME="lib"

          ARTIFACT_BASE="osi-${{ steps.versions.outputs.source-version-clean }}-${{ matrix.artifact-os }}"
          TARGET_LIB_DIR="$STAGING_DIR/$LIB_DIR_NAME/$CONF_DIR"
          TARGET_DEPS_LIB_DIR="$STAGING_DIR/deps/$CONF_DIR"
          METADATA_FILE="${{ github.workspace }}/${{ matrix.os }}-${{ matrix.configuration }}-${{ matrix.linkage }}-metadata.txt"
          ARTIFACT_TAR="${ARTIFACT_BASE}-${{ matrix.configuration }}-${{ matrix.linkage }}.tar"
          ARTIFACT_UPLOAD_NAME="package-${ARTIFACT_BASE}-${{ matrix.configuration }}-${{ matrix.linkage }}"

          echo "VCPKG_INSTALLED_DIR=$VCPKG_INSTALLED_DIR" >> "$GITHUB_ENV"
          echo "VCPKG_LIB_DIR=$VCPKG_LIB_DIR" >> "$GITHUB_ENV"
          echo "VCPKG_BIN_DIR=$VCPKG_BIN_DIR" >> "$GITHUB_ENV"
          echo "STAGING_DIR=$STAGING_DIR" >> "$GITHUB_ENV"
          echo "TARGET_LIB_DIR=$TARGET_LIB_DIR" >> "$GITHUB_ENV"
          echo "TARGET_DEPS_LIB_DIR=$TARGET_DEPS_LIB_DIR" >> "$GITHUB_ENV"
          echo "METADATA_FILE=$METADATA_FILE" >> "$GITHUB_ENV"
          echo "ARTIFACT_TAR=$ARTIFACT_TAR" >> "$GITHUB_ENV"
          echo "ARTIFACT_UPLOAD_NAME=$ARTIFACT_UPLOAD_NAME" >> "$GITHUB_ENV"

      - name: Prepare Artifact Staging
        shell: bash
        run: |
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR/include"
          mkdir -p "$TARGET_LIB_DIR"
          mkdir -p "$TARGET_DEPS_LIB_DIR"

          if [ -d "${{ github.workspace }}/build-osi/include/osi3" ]; then
            cp -R "${{ github.workspace }}/build-osi/include/osi3/." "$STAGING_DIR/include/"
          fi

          if [ -d "$VCPKG_INSTALLED_DIR/include" ]; then
            cp -R "$VCPKG_INSTALLED_DIR/include/." "$STAGING_DIR/include/"
          fi

      - name: Stage Protobuf and Dependencies
        shell: bash
        run: |
          # Windows-specific moves first to prevent duplication in later generic copy
          if [ "$RUNNER_OS" = "Windows" ] && [ "${{ matrix.linkage }}" = "dynamic" ]; then
            find "$VCPKG_BIN_DIR" -maxdepth 1 -name "abseil_dll.dll" -exec mv {} "$TARGET_LIB_DIR/" \;
            find "$VCPKG_LIB_DIR" -maxdepth 1 -name "abseil_dll.lib" -exec mv {} "$TARGET_LIB_DIR/" \;
            if [ "${{ matrix.configuration }}" = "Release" ]; then
              find "$VCPKG_BIN_DIR" -maxdepth 1 -name "libprotobuf.dll" -exec mv {} "$TARGET_LIB_DIR/" \;
            else
              find "$VCPKG_BIN_DIR" -maxdepth 1 -name "libprotobufd.dll" -exec mv {} "$TARGET_LIB_DIR/" \;
            fi
          fi

          # Generic move/copy only acts on files still in source directory
          find "$VCPKG_LIB_DIR" -maxdepth 1 -name "*protobuf*" -exec mv {} "$TARGET_LIB_DIR/" \;
          find "$VCPKG_LIB_DIR" -maxdepth 1 \( -type f -o -type l \) \( -name "*.lib" -o -name "*.a" \) -exec cp -RP {} "$TARGET_DEPS_LIB_DIR/" \;

      - name: Archive Artifacts Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          OSI_SRC_DIR="${{ github.workspace }}/build-osi/${{ matrix.configuration }}"

          if [ "${{ matrix.linkage }}" = "static" ]; then
            cp -P "$OSI_SRC_DIR/open_simulation_interface_static.lib" "$TARGET_LIB_DIR/open_simulation_interface_pic.lib" 2>/dev/null || true
          else
            cp -P "$OSI_SRC_DIR/open_simulation_interface.dll" "$TARGET_LIB_DIR/" 2>/dev/null || true
            cp -P "$OSI_SRC_DIR/open_simulation_interface_pic.lib" "$TARGET_LIB_DIR/" 2>/dev/null || true
          fi

      - name: Archive Artifacts Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          OSI_SRC_DIR="${{ github.workspace }}/build-osi"

          if [ "${{ matrix.linkage }}" = "static" ]; then
            cp -P "$OSI_SRC_DIR/libopen_simulation_interface_pic.a" "$TARGET_LIB_DIR/" 2>/dev/null || true
          else
            cp -RP "$OSI_SRC_DIR/libopen_simulation_interface.so"* "$TARGET_LIB_DIR/" 2>/dev/null || true
          fi

      - name: Archive Artifacts macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          OSI_SRC_DIR="${{ github.workspace }}/build-osi"

          if [ "${{ matrix.linkage }}" = "static" ]; then
            cp -P "$OSI_SRC_DIR/libopen_simulation_interface_pic.a" "$TARGET_LIB_DIR/" 2>/dev/null || true
          else
            cp -RP "$OSI_SRC_DIR/libopen_simulation_interface"*.dylib* "$TARGET_LIB_DIR/" 2>/dev/null || true
          fi

      - name: Finalize Artifact Package
        shell: bash
        run: |
          [ -f "$METADATA_FILE" ] && cp "$METADATA_FILE" "$STAGING_DIR/"
          find "$STAGING_DIR" -name "*protobuf-lite*" -delete
          find "$STAGING_DIR" -name "libprotoc*" -delete

          tar -cvzf "$ARTIFACT_TAR" -C "$STAGING_DIR" .

      - name: Upload OSI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_UPLOAD_NAME }}
          path: ${{ env.ARTIFACT_TAR }}
          compression-level: 0

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    env:
      OSI_VERSION: ${{ needs.build.outputs.osi-version }}
      OSI_VERSION_CLEAN: ${{ needs.build.outputs.osi-version-clean }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-osi-${{ env.OSI_VERSION_CLEAN }}-*
          path: staging

      - name: Bundle platform packages
        shell: bash
        run: |
          for os in linux macos windows; do
            case "$os" in
              linux)   FOLDER_NAME="linux" ;;
              macos)   FOLDER_NAME="mac" ;;
              windows) FOLDER_NAME="v10" ;;
            esac

            ARCHIVE_NAME="osi-$os"
            FINAL_DIR="$ARCHIVE_NAME/$FOLDER_NAME"

            mkdir -p "$FINAL_DIR"

            for tarfile in staging/package-osi-${{ env.OSI_VERSION_CLEAN }}-$os*/*.tar; do
              tar -xvf "$tarfile" -C "$FINAL_DIR"
            done

            tar -cJvf "${ARCHIVE_NAME}.tar.xz" -C "${ARCHIVE_NAME}" .
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: 'osi build for version ${{ env.OSI_VERSION }} containing debug, release, static and dynamic files per platform'
          files: "osi-*.tar.xz"
          token: ${{ secrets.GITHUB_TOKEN }}
